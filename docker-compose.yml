version: "3.9"
services:
  web:
    container_name: nutrisync_web # Nombre explícito para fácil administración por consola
    build: .
    command: python manage.py runserver 0.0.0.0:8000 # Usamos el servidor de desarrollo por defecto de Django en lugar de Gunicorn
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  db:
    container_name: nutrisync_db # Contenedor de la base de datos
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
  pgadmin:
    container_name: nutrisync_pgadmin # Interfaz gráfica para gestionar PostgreSQL
    image: dpage/pgadmin4
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
volumes:
  postgres_data:
  pgadmin_data:
